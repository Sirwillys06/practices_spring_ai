<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat IA</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR */
.chat {
    width: 420px;
    height: 650px;
    background: #ffffff;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* HEADER */
.header {
    background: #007bff;
    color: white;
    padding: 15px;
    font-weight: bold;
    text-align: center;
    font-size: 18px;
}

/* MENSAJES */
.mensajes {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f5f7fb;
}

/* BURBUJAS */
.mensaje {
    padding: 10px 14px;
    border-radius: 15px;
    max-width: 75%;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeIn 0.3s ease;
}

.usuario {
    background: #007bff;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
}

.bot {
    background: #e4e6eb;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0056b3;
}

/* ANIMACIÓN */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1; transform: translateY(0);}
}

/* SCROLL BONITO */
.mensajes::-webkit-scrollbar {
    width: 6px;
}
.mensajes::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="chat">

    <div class="header">
        🤖 Asistente IA
    </div>

    <div id="mensajes" class="mensajes"></div>

    <div class="input-area">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje..." onkeypress="handleKey(event)">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script>

function agregarMensaje(texto, clase) {
    let div = document.createElement("div");
    div.className = "mensaje " + clase;
    div.innerText = texto;

    document.getElementById("mensajes").appendChild(div);
    scrollAuto();
}


function scrollAuto() {
    let contenedor = document.getElementById("mensajes");
    contenedor.scrollTop = contenedor.scrollHeight;
}


function handleKey(event) {
    if (event.key === "Enter") {
        enviar();
    }
}


function mensajeCargando() {
    let div = document.createElement("div");
    div.className = "mensaje bot";
    div.id = "loading";
    div.innerText = "Escribiendo...";
    document.getElementById("mensajes").appendChild(div);
    scrollAuto();
}


function quitarCargando() {
    let loading = document.getElementById("loading");
    if (loading) loading.remove();
}







/* Logica para enviar mensaje al backend */
function enviar() {
    let input = document.getElementById("mensaje");
    let texto = input.value.trim();

    if (!texto) return;

    agregarMensaje(texto, "usuario");
    input.value = "";

    mensajeCargando();

    fetch(`http://localhost:8080/ia?mensaje=${encodeURIComponent(texto)}`) 
        .then(res => res.text())
        .then(data => {
            quitarCargando();
            agregarMensaje(data, "bot");
        })
        .catch(() => {
            quitarCargando();
            agregarMensaje("Error al conectar con la IA", "bot");
        });
}

</script>

</body>
</html>
